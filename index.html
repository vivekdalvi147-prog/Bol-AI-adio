<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.5 Live Audio</title>
    <style>
        :root {
            --primary-glow: #00ffff;
            --recording-glow: #ff0055;
            --thinking-glow: #ffcc00;
            --bg-color: #050505;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* ORB ANIMATION CONTAINER */
        .orb-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .orb-container:active {
            transform: scale(0.95);
        }

        /* MAIN GLOWING CIRCLE */
        .orb {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(0,255,255,0.4), rgba(0,0,0,0.9));
            box-shadow: 0 0 30px var(--primary-glow), inset 0 0 20px var(--primary-glow);
            position: relative;
            z-index: 2;
            transition: all 0.5s ease;
        }

        /* PULSING RINGS */
        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary-glow);
            opacity: 0;
            z-index: 1;
            transform: scale(0.8);
        }

        /* STATE: IDLE ANIMATION */
        .state-idle .orb {
            animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 30px var(--primary-glow); }
            50% { box-shadow: 0 0 60px var(--primary-glow); }
        }

        /* STATE: RECORDING */
        .state-recording .orb {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,0,85,0.5), rgba(0,0,0,0.9));
            box-shadow: 0 0 50px var(--recording-glow);
        }
        .state-recording .ring {
            border-color: var(--recording-glow);
            animation: ripple 1.5s infinite linear;
        }

        /* STATE: THINKING */
        .state-thinking .orb {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,204,0,0.5), rgba(0,0,0,0.9));
            box-shadow: 0 0 40px var(--thinking-glow);
            animation: spin 1s infinite linear;
        }

        /* STATE: SPEAKING */
        .state-speaking .orb {
            box-shadow: 0 0 80px var(--primary-glow);
            animation: speakPulse 0.5s infinite alternate;
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        @keyframes speakPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* TEXT STATUS */
        .status-text {
            margin-top: 50px;
            font-size: 18px;
            letter-spacing: 1px;
            color: #888;
            font-weight: 300;
            text-transform: uppercase;
        }
        
        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: #444;
        }

    </style>
</head>
<body class="state-idle">

    <div class="orb-container" id="interactionBtn">
        <div class="orb"></div>
        <div class="ring" style="animation-delay: 0s"></div>
        <div class="ring" style="animation-delay: 0.5s"></div>
        <div class="ring" style="animation-delay: 1s"></div>
    </div>

    <div class="status-text" id="status">Tap & Hold to Speak</div>
    <div class="hint">Powered by Gemini 2.5 Native Audio</div>

    <script>
        const btn = document.getElementById('interactionBtn');
        const body = document.body;
        const statusEl = document.getElementById('status');
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // 1. MIC SETUP
        async function setupMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    uploadAudio(audioBlob);
                };
                
                statusEl.innerText = "Tap & Hold to Speak";
            } catch (err) {
                statusEl.innerText = "Please Allow Mic Access";
                statusEl.style.color = "red";
                console.error("Mic Error:", err);
            }
        }

        // 2. SEND TO API
        async function uploadAudio(blob) {
            setVisualState('thinking');
            statusEl.innerText = "Gemini is thinking...";

            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ audio: base64Audio })
                    });

                    const data = await response.json();

                    if (data.audio) {
                        playAudioResponse(data.audio);
                    } else if (data.error) {
                        alert("API Error: " + data.error);
                        setVisualState('idle');
                        statusEl.innerText = "Error. Try Again.";
                    }
                } catch (e) {
                    console.error(e);
                    setVisualState('idle');
                    statusEl.innerText = "Connection Error";
                }
            };
        }

        // 3. PLAY AUDIO
        function playAudioResponse(base64Audio) {
            setVisualState('speaking');
            statusEl.innerText = "Gemini Speaking...";
            
            const audio = new Audio("data:audio/wav;base64," + base64Audio);
            audio.play();

            audio.onended = () => {
                setVisualState('idle');
                statusEl.innerText = "Tap & Hold to Speak";
            };
        }

        // 4. UI STATE MANAGER
        function setVisualState(state) {
            body.className = ''; // Reset
            body.classList.add('state-' + state);
        }

        // 5. EVENT LISTENERS (Mouse & Touch)
        const start = (e) => {
            e.preventDefault();
            if (!mediaRecorder || mediaRecorder.state === 'recording') return;
            mediaRecorder.start();
            setVisualState('recording');
            statusEl.innerText = "Listening...";
        };

        const stop = (e) => {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                // Visual state will change to 'thinking' inside uploadAudio
            }
        };

        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', stop);
        btn.addEventListener('mouseleave', stop); // Agar mouse bahar chala jaye

        btn.addEventListener('touchstart', start);
        btn.addEventListener('touchend', stop);

        // Initialize
        setupMic();

    </script>
</body>
</html>
