<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Human Voice TTS</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            color: #2d3748;
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 1rem;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #4299e1;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
            margin-bottom: 1rem;
            background: #fff;
            font-size: 0.95rem;
        }

        button {
            background-color: #48bb78;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: #38a169;
        }

        .hint {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #e53e3e;
            background: #fff5f5;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #feb2b2;
        }

        .highlight-voice {
            background-color: #e6fffa;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🗣️ Natural Text to Speech</h2>
        
        <textarea id="text" placeholder="Yaha Marathi/Hindi text likhein... (e.g., Mala asa pahije...)"></textarea>

        <select id="voices">
            <option value="">Voice Load ho rahi hai...</option>
        </select>

        <button id="speak">🔊 Bolna Shuru Karein</button>

        <div class="hint">
            <strong>Important:</strong> Best Quality aur "Real Human Voice" ke liye is website ko <u>Microsoft Edge</u> browser mein chalayein aur <b>"Natural"</b> wali voice select karein.
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('text');
        const voiceSelect = document.getElementById('voices');
        const speakBtn = document.getElementById('speak');

        let voices = [];

        function loadVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';

            // Pehle "Natural" voices ko dhund kar upar dikhayenge
            // Microsoft Edge me "Natural" voices hoti hain jo robot nahi lagti
            const naturalVoices = voices.filter(voice => voice.name.includes("Natural"));
            const otherVoices = voices.filter(voice => !voice.name.includes("Natural"));

            // Natural voices add karna
            naturalVoices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `🌟 ${voice.name} (Natural)`;
                option.value = voice.name;
                option.style.fontWeight = "bold";
                option.style.color = "#2b6cb0";
                voiceSelect.appendChild(option);
            });

            // Baaki voices add karna
            otherVoices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });

            // Agar koi voice nahi mili
            if(voices.length === 0){
                const option = document.createElement('option');
                option.textContent = "No voices found (Try opening in Edge)";
                voiceSelect.appendChild(option);
            }
        }

        // Voices load hone ka wait karein
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        speakBtn.addEventListener('click', () => {
            if (synth.speaking) {
                console.error('Already speaking...');
                return;
            }

            if (textInput.value !== '') {
                const speakText = new SpeechSynthesisUtterance(textInput.value);
                
                const selectedVoiceName = voiceSelect.value;
                const selectedVoice = voices.find(voice => voice.name === selectedVoiceName);

                if (selectedVoice) {
                    speakText.voice = selectedVoice;
                }

                // Rate aur Pitch ko normal rakhenge taaki insaan jaisa lage
                speakText.rate = 1; 
                speakText.pitch = 1;

                speakBtn.innerText = "Bol raha hai...";
                
                speakText.onend = () => {
                    speakBtn.innerText = "🔊 Bolna Shuru Karein";
                };

                synth.speak(speakText);
            }
        });
    </script>
</body>
</html>
