<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech Converter</title>
    <style>
        /* CSS: Website ko sundar dikhane ke liye */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: none;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: #764ba2;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
            cursor: pointer;
        }

        .settings {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .setting-box {
            width: 48%;
            text-align: left;
        }
        
        .setting-box label {
            font-size: 12px;
            color: #666;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #5b3a7d;
        }
        
        button:active {
            transform: scale(0.98);
        }

        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Text to Audio Converter</h1>
        
        <textarea id="text-input" placeholder="Yahan apna text likhein jo aap audio mein sunna chahte hain..."></textarea>

        <div class="controls">
            <!-- Voice Selection -->
            <select id="voice-select">
                <option value="" disabled selected>Voice Select Karein...</option>
            </select>

            <!-- Speed & Pitch Controls -->
            <div class="settings">
                <div class="setting-box">
                    <label>Speed (Rate)</label>
                    <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
                </div>
                <div class="setting-box">
                    <label>Aawaz ka Bhari-pan (Pitch)</label>
                    <input type="range" id="pitch" min="0" max="2" value="1" step="0.1">
                </div>
            </div>

            <button id="speak-btn">🔊 Play Audio</button>
        </div>
        <p class="status" id="status-msg"></p>
    </div>

    <script>
        // JavaScript: Logic jo text ko audio banata hai
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        const rateInput = document.getElementById('rate');
        const pitchInput = document.getElementById('pitch');
        const speakBtn = document.getElementById('speak-btn');
        const statusMsg = document.getElementById('status-msg');

        let voices = [];

        // Sare available voices load karna
        function populateVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';

            // Sirf wahi voices dikhaye jo available hain
            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.setAttribute('data-lang', voice.lang);
                option.setAttribute('data-name', voice.name);
                voiceSelect.appendChild(option);
            });
        }

        // Browser voices load hone me thoda time leta hai
        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }

        // Bolne wala function
        const speak = () => {
            if (synth.speaking) {
                console.error('Already speaking...');
                return;
            }

            if (textInput.value !== '') {
                // Animation start
                speakBtn.innerText = "Speaking...";
                statusMsg.innerText = "Audio generate ho raha hai...";

                const speakText = new SpeechSynthesisUtterance(textInput.value);
                
                // Selected Voice set karna
                const selectedOption = voiceSelect.selectedOptions[0].getAttribute('data-name');
                for (let i = 0; i < voices.length; i++) {
                    if (voices[i].name === selectedOption) {
                        speakText.voice = voices[i];
                    }
                }

                // Speed aur Pitch set karna
                speakText.rate = rateInput.value;
                speakText.pitch = pitchInput.value;

                // Jab bolna khatam ho jaye
                speakText.onend = e => {
                    speakBtn.innerText = "🔊 Play Audio";
                    statusMsg.innerText = "Complete!";
                };

                // Agar koi error aaye
                speakText.onerror = e => {
                    console.error('Something went wrong');
                    speakBtn.innerText = "🔊 Play Audio";
                };

                synth.speak(speakText);
            } else {
                alert('Pahle kuch text likhein!');
            }
        };

        // Button click par function chalana
        speakBtn.addEventListener('click', e => {
            e.preventDefault();
            speak();
        });
    </script>

</body>
</html>
